<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0052d9">
  <meta name="description" content="搜索 - 辉のblog">
  <meta name="author" content="Lun XuHui">
  <title>搜索 - LLM论文精读</title>
  <!-- Favicon -->
  <link rel="icon" type="image/x-icon" href="/img/favicon.ico">
  <link rel="icon" type="image/png" sizes="16x16" href="/img/favicon-16x16.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/img/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="48x48" href="/img/favicon-48x48.png">
  <link rel="icon" type="image/png" sizes="64x64" href="/img/favicon-64x64.png">
  <link rel="icon" type="image/png" sizes="96x96" href="/img/favicon-96x96.png">
  <link rel="icon" type="image/png" sizes="128x128" href="/img/favicon-128x128.png">
  <link rel="icon" type="image/png" sizes="192x192" href="/img/favicon-192x192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="/img/favicon-512x512.png">
  <link rel="apple-touch-icon" sizes="192x192" href="/img/favicon-192x192.png">
  <link rel="mask-icon" href="/img/favicon.svg" color="#0b6df6">
  <link rel="stylesheet" href="/css/clean.css">
  <style>
    .search-page {
      min-height: 60vh;
    }
    .search-container {
      width: min(1180px, calc(100% - 48px));
      margin: 0 auto;
      padding: 58px 0;
    }
    .search-page-form {
      margin-bottom: 40px;
      max-width: 600px;
    }
    .search-page-input {
      width: 100%;
      min-height: 44px;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 10px 20px;
      font-size: 0.95rem;
      color: var(--text);
      background: rgba(255, 255, 255, 0.9);
      transition: border-color 0.18s ease, box-shadow 0.18s ease;
    }
    .search-page-input::placeholder {
      color: var(--muted);
    }
    .search-page-input:focus {
      outline: none;
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(0, 82, 217, 0.1);
    }
    .search-results {
      display: grid;
      gap: 18px;
      max-width: 860px;
    }
    .search-result-item {
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 24px;
      background: var(--surface);
      box-shadow: var(--shadow);
      transition: border-color 0.18s ease, box-shadow 0.18s ease;
    }
    .search-result-item:hover {
      border-color: var(--blue);
      box-shadow: 0 24px 56px rgba(0, 48, 126, 0.12);
    }
    .search-result-item h3 {
      margin: 0 0 12px;
      font-size: 1.2rem;
      line-height: 1.34;
      letter-spacing: 0;
    }
    .search-result-item h3 a {
      color: var(--blue);
    }
    .search-result-item h3 a:hover {
      text-decoration: underline;
    }
    .search-excerpt {
      color: var(--muted);
      font-size: 0.9rem;
      line-height: 1.6;
      margin-bottom: 12px;
    }
    .search-excerpt mark {
      background: #fff8c5;
      border-radius: 2px;
      padding: 0 2px;
      font-weight: 600;
    }
    .search-url {
      color: #11b981;
      font-size: 0.85rem;
    }
    .no-results {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }
    .no-results h2 {
      margin: 0 0 12px;
      color: var(--text);
    }
    .search-tips {
      margin-top: 40px;
      padding: 24px;
      background: var(--surface-soft);
      border-radius: 14px;
      border-left: 4px solid var(--blue);
    }
    .search-tips h3 {
      margin: 0 0 12px;
      font-size: 1rem;
    }
    .search-tips ul {
      margin: 0;
      padding-left: 20px;
      color: var(--muted);
    }
    .search-tips li {
      margin-bottom: 8px;
    }
  </style>
</head>
<body>
  <div id="site-header-placeholder"></div>
  <script src="/js/include-header.js"></script>
  <div class="search-bar-container">
    <!-- header search form will be injected by components/header.html -->
    <form class="search-bar" onsubmit="handleSearchSubmitHeader(event)">
      <input type="text" id="search-input-header" class="search-bar-input" placeholder="搜索文章、笔记、论文..." />
    </form>
  </div>
  <main class="content search-page">
    <div class="search-container">
      <h1 style="margin: 0 0 32px; font-size: 2.5rem;">搜索</h1>
      <form class="search-page-form" onsubmit="handleSearchSubmit(event)">
        <input type="text" id="search-keywords" class="search-page-input" placeholder="搜索文章、笔记、论文..." />
      </form>
      <div id="search-results" class="search-results"></div>
      <div id="search-no-results" class="no-results" style="display: none;">
        <h2>未找到相关内容</h2>
        <p>请尝试使用其他关键词进行搜索。</p>
        <div class="search-tips">
          <h3>搜索提示</h3>
          <ul>
            <li>检查拼写和语法</li>
            <li>尝试使用更通用的关键词</li>
            <li>尝试减少关键词的数量</li>
            <li>使用单个关键词进行搜索</li>
          </ul>
        </div>
      </div>
    </div>
  </main>
  <footer class="footer">
    <span>认真写一点能留下来的东西。</span>
  </footer>
  <script>
    let searchData = [];

    // 加载搜索数据
    async function loadSearchData() {
      try {
        const response = await fetch('/search.xml');
        const text = await response.text();
        const parser = new DOMParser();
        const xmlDoc = parser.parseFromString(text, 'text/xml');
        const entries = xmlDoc.getElementsByTagName('entry');
        
        searchData = Array.from(entries).map(entry => ({
          title: entry.getElementsByTagName('title')[0]?.textContent || '',
          url: entry.getElementsByTagName('url')[0]?.textContent || '',
          content: entry.getElementsByTagName('content')[0]?.textContent || ''
        }));
      } catch (error) {
        console.error('加载搜索数据失败:', error);
      }
    }

    // 执行搜索
    function performSearch(query) {
      const normalizedQuery = query.toLowerCase().trim();
      
      if (!normalizedQuery) {
        document.getElementById('search-results').innerHTML = '';
        document.getElementById('search-no-results').style.display = 'none';
        return;
      }

      const results = searchData
        .map(item => {
          const text = `${item.title} ${item.content}`.toLowerCase();
          const index = text.indexOf(normalizedQuery);
          const score = (text.split(normalizedQuery).length - 1);
          return { item, score, index };
        })
        .filter(result => result.score > 0)
        .sort((a, b) => b.score - a.score)
        .slice(0, 20);

      const resultsContainer = document.getElementById('search-results');
      const noResultsContainer = document.getElementById('search-no-results');

      if (results.length === 0) {
        resultsContainer.innerHTML = '';
        noResultsContainer.style.display = 'block';
      } else {
        noResultsContainer.style.display = 'none';
        resultsContainer.innerHTML = results.map(({ item, index }) => {
          const content = item.content;
          let excerpt = content;
          
          if (index >= 0) {
            const start = Math.max(0, index - 50);
            const end = Math.min(content.length, index + normalizedQuery.length + 100);
            excerpt = (start > 0 ? '...' : '') + content.substring(start, end) + (end < content.length ? '...' : '');
          }

          const highlightedExcerpt = excerpt.replace(
            new RegExp(`(${normalizedQuery.replace(/[-/\\^$*+?.()|[\]{}]/g, '\\$&')})`, 'gi'),
            '<mark>$1</mark>'
          );

          return `
            <article class="search-result-item">
              <h3><a href="${item.url}">${item.title}</a></h3>
              <p class="search-excerpt">${highlightedExcerpt}</p>
              <p class="search-url">${item.url}</p>
            </article>
          `;
        }).join('');
      }
    }

    function handleSearchSubmit(event) {
      event.preventDefault();
      const query = document.getElementById('search-keywords').value;
      const params = new URLSearchParams(window.location.search);
      params.set('keywords', query);
      window.history.replaceState({}, '', `?${params.toString()}`);
      performSearch(query);
    }

    function handleSearchSubmitHeader(event) {
      event.preventDefault();
      const query = document.getElementById('search-input-header').value;
      const params = new URLSearchParams(window.location.search);
      params.set('keywords', query);
      window.history.replaceState({}, '', `?${params.toString()}`);
      performSearch(query);
    }

    // 初始化
    document.addEventListener('DOMContentLoaded', async () => {
      await loadSearchData();
      
      const params = new URLSearchParams(window.location.search);
      const keywords = params.get('keywords') || '';
      
      if (keywords) {
        document.getElementById('search-keywords').value = keywords;
        performSearch(keywords);
      }
    });
  </script>
</body>
</html>

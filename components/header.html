<header class="site-header">
  <nav class="nav" aria-label="主导航">
    <div class="nav-center">
      <form class="search-bar" id="header-search-form">
        <input type="text" id="search-input-header" class="search-bar-input" placeholder="搜索文章、笔记、论文..." />
      </form>
    </div>
    <div class="nav-links">
      <a href="/">首页</a>
      <a href="/archives/">归档</a>
      <a href="/tags/">标签</a>
      <a href="/about/">关于</a>
      <a href="/journey/">人生轨迹</a>
      <a href="/links/">友链</a>
    </div>
  </nav>
</header>

<script>
  (function(){
    const form = document.getElementById('header-search-form');
    if (!form) return;
    form.addEventListener('submit', function(e){
      e.preventDefault();
      const v = (document.getElementById('search-input-header') || {}).value || '';
      const q = v.trim();
      if (q) location.href = '/search/?keywords=' + encodeURIComponent(q);
    });
  })();
</script>

<body class="journey-map-page">
  <nav class="journey-nav" aria-label="主导航">
    <a class="brand" href="/">辉のblog</a>
    <div class="nav-links"><a href="/">首页</a><a href="/archives/">归档</a><a href="/categories/">分类</a><a href="/tags/">标签</a><a href="/about/">关于</a><a class="active" href="/journey/">人生轨迹</a><a href="/links/">友链</a></div>
  </nav>

  <main class="journey-map-stage" aria-label="人生轨迹中国地图">
    <div class="map-toolbar" aria-label="地图缩放控件">
      <button type="button" id="map-zoom-in" aria-label="放大地图">+</button>
      <button type="button" id="map-zoom-out" aria-label="缩小地图">-</button>
      <button type="button" id="map-reset" aria-label="重置地图视图">重置</button>
    </div>

    <div class="map-canvas" id="map-canvas">
      <div id="amap-container" class="amap-container" aria-label="真实中国地图展示"></div>
      <svg id="journey-map" class="journey-map" viewBox="0 0 100 100" role="img" aria-labelledby="map-title map-desc">
        <title id="map-title">中国地图人生轨迹</title>
        <desc id="map-desc">可缩放拖拽的中国地图，鼠标划过已记录城市会显示时间和事件。</desc>
        <defs>
          <linearGradient id="landFill" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#f8fbff"></stop>
            <stop offset="100%" stop-color="#dbeafe"></stop>
          </linearGradient>
          <filter id="softMapShadow" x="-15%" y="-15%" width="130%" height="130%">
            <feDropShadow dx="0" dy="8" stdDeviation="5" flood-color="#0052d9" flood-opacity="0.14"></feDropShadow>
          </filter>
        </defs>

        <g id="map-viewport">
          <rect class="ocean-bg" x="-20" y="-20" width="140" height="140"></rect>
          <g class="map-land" filter="url(#softMapShadow)">
            <path class="province west" d="M12 33 L22 23 L34 22 L39 29 L36 40 L25 47 L14 44 Z"></path>
            <path class="province north" d="M37 22 L48 16 L62 19 L69 27 L61 35 L47 34 L39 29 Z"></path>
            <path class="province east" d="M62 25 L78 25 L89 36 L84 48 L72 54 L61 44 Z"></path>
            <path class="province central" d="M36 40 L47 34 L61 35 L66 47 L59 61 L43 61 L31 52 Z"></path>
            <path class="province southwest" d="M25 47 L36 42 L43 61 L54 72 L44 80 L30 73 L18 61 Z"></path>
            <path class="province south" d="M59 61 L72 54 L84 57 L86 68 L75 80 L63 80 L54 72 Z"></path>
            <path class="province northeast" d="M68 20 L79 21 L91 31 L88 39 L78 35 L69 27 Z"></path>
            <path class="province island" d="M73 84 C77 81 81 83 81 87 C78 90 74 89 73 84 Z"></path>
            <path class="province island" d="M86 75 C88 74 90 75 90 78 C88 79 86 78 86 75 Z"></path>
          </g>

          <path class="map-road" d="M18 45 C33 38 46 38 62 43 C75 47 83 55 87 65"></path>
          <path class="map-road" d="M34 23 C38 40 38 57 32 74"></path>
          <path class="map-road" d="M55 18 C55 35 58 55 66 80"></path>
          <path id="journey-route" class="journey-route" d=""></path>
          <g id="journey-points" class="journey-points"></g>
        </g>
      </svg>
    </div>

    <div class="map-tooltip" id="map-tooltip" role="status" aria-live="polite"></div>
  </main>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-o9N1j7jv7R0P06JmT6wFlrj+C1Lf+7v7oSg6BM911uo=" crossorigin=""></script>
  <script src="https://webapi.amap.com/maps?v=2.0&key=8264fbd6bb0c22bc33704fd2fd215543&callback=initAMap" async defer></script>
  <script src="/js/journey.js"></script>
</body>
</html>
